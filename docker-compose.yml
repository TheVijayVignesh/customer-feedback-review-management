version: '3.8'

services:
  # MySQL Database
  mysql:
    image: mysql:8.0
    container_name: feedback-mysql
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-feedback_db}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root_password}
      MYSQL_USER: ${MYSQL_USER:-feedback_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-feedback_password}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init-db.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - feedback-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "${MYSQL_USER:-feedback_user}"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Backend API
  feedback-server:
    image: feedback-server:latest
    container_name: feedback-server
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      PORT: 8080
      NODE_ENV: production
      DATABASE_URL: mysql://${MYSQL_USER:-feedback_user}:${MYSQL_PASSWORD:-feedback_password}@mysql:3306/${MYSQL_DATABASE:-feedback_db}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost}
    ports:
      - "8080:8080"
    networks:
      - feedback-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/auth/login"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Frontend
  feedback-client:
    image: feedback-client:latest
    container_name: feedback-client
    depends_on:
      - feedback-server
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8080/api}
    ports:
      - "80:80"
    networks:
      - feedback-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  mysql_data:
    driver: local

networks:
  feedback-net:
    driver: bridge
