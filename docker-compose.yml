version: '3.8'

services:
  db:
    build:
      context: ./db
      dockerfile: Dockerfile
    image: feedback-db:latest
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: feedbackdb
    volumes:
      - db-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    image: feedback-server:latest
    depends_on:
      - db
    ports:
      - "5000:5000"
    environment:
      PORT: 5000
      DATABASE_URL: postgres://postgres:postgres@db:5432/feedbackdb
    volumes:
      # mount so you can run prisma migrations from host if needed
      - ./server/prisma:/app/prisma

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    image: feedback-client:latest
    depends_on:
      - server
    ports:
      - "80:80"

volumes:
  db-data:
    driver: local
