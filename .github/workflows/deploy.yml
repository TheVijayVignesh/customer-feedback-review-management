name: Build and Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:


jobs:
  # ─────────────────────────────────────────
  # JOB 1: Build & Push Docker Images
  # ─────────────────────────────────────────
  build:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & Push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./server
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/feedback-backend:latest

      - name: Build & Push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./client
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/feedback-frontend:latest
          build-args: |
            VITE_API_URL=${{ secrets.VITE_API_URL }}

  # ─────────────────────────────────────────
  # JOB 2: Terraform Apply
  # ─────────────────────────────────────────
  terraform:
    name: Terraform Apply
    runs-on: ubuntu-latest
    needs: build
    defaults:
      run:
        working-directory: ./infra

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Terraform Init
        run: terraform init

      - name: Terraform Plan
        run: terraform plan

      - name: Terraform Apply
        run: terraform apply -auto-approve

      - name: Get EC2 Instance ID
        id: get_instance
        run: |
          INSTANCE_ID=$(aws ec2 describe-instances \
            --filters "Name=tag:Name,Values=feedback-app" \
                      "Name=instance-state-name,Values=running" \
            --query "Reservations[0].Instances[0].InstanceId" \
            --output text \
            --region ${{ secrets.AWS_REGION }})
          echo "instance_id=$INSTANCE_ID" >> $GITHUB_OUTPUT

    outputs:
      instance_id: ${{ steps.get_instance.outputs.instance_id }}

  # ─────────────────────────────────────────
  # JOB 3: Deploy containers on EC2
  # ─────────────────────────────────────────
  deploy:
    name: Deploy on EC2
    runs-on: ubuntu-latest
    needs: terraform

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Install SSM plugin
        run: |
          curl "https://s3.amazonaws.com/session-manager-downloads/plugin/latest/ubuntu_64bit/session-manager-plugin.deb" -o "session-manager-plugin.deb"
          sudo dpkg -i session-manager-plugin.deb

      - name: Pull latest images and restart containers
        run: |
          aws ssm send-command \
            --instance-ids ${{ needs.terraform.outputs.instance_id }} \
            --document-name "AWS-RunShellScript" \
            --parameters commands='[
              "sudo su - ec2-user -c \"cd /home/ec2-user/feedback-app && docker-compose pull && docker-compose up -d --force-recreate\""
            ]' \
            --region ${{ secrets.AWS_REGION }} \
            --output text \
            --query "Command.CommandId"

      - name: Wait for containers to start
        run: sleep 30

  # ─────────────────────────────────────────
  # JOB 4: Run Prisma Migrations
  # ─────────────────────────────────────────
  migrate:
    name: Run Prisma Migrations
    runs-on: ubuntu-latest
    needs: [terraform, deploy]

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Run Prisma db push
        run: |
          aws ssm send-command \
            --instance-ids ${{ needs.terraform.outputs.instance_id }} \
            --document-name "AWS-RunShellScript" \
            --parameters commands='[
              "sudo su - ec2-user -c \"cd /home/ec2-user/feedback-app && docker-compose exec -T backend npx prisma db push\""
            ]' \
            --region ${{ secrets.AWS_REGION }} \
            --output text \
          --query "Command.CommandId"
